<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Support | AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Enterprise Support</h1>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span> Online
            </div>
        </header>

        <main id="chat-window">
            <div class="welcome-message">
                <h2>Welcome to AI Support</h2>
                <p>I can help you with product technical specs, warranty checks, and troubleshooting. How can I assist you today?</p>
                <div class="suggestions">
                    <button class="suggestion-btn" onclick="sendSuggestion('What are the specs of TechGizmo Pro X1?')">TechGizmo Specs</button>
                    <button class="suggestion-btn" onclick="sendSuggestion('Check warranty for SN-X19876')">Warranty Check</button>
                    <button class="suggestion-btn" onclick="sendSuggestion('How do I setup SmartHome Hub?')">SmartHome Setup</button>
                </div>
            </div>
            <div id="messages"></div>
            <div id="typing-indicator" class="hidden">
                <span></span><span></span><span></span>
            </div>
        </main>

        <footer>
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
                <button type="submit" id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
        </footer>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
